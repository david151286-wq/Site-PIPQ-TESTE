<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo Cântico - PIPQ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f2019">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="voltar-flutuante" href="index.html" aria-label="Voltar para o início">
    <i class="fa-solid fa-arrow-left"></i>
  </a>

  <div class="page-content">
    <div class="tool-wrap">

      <div class="tool-header">
        <i class="fa-solid fa-book-bible"></i>
        <h1>Novo Cântico</h1>
      </div>

      <!-- Aparece só se o carregamento automático (fetch) falhar -->
      <div class="carregador" id="carregadorCantico" style="display:none;">
        <p>Escolha o arquivo <strong>novo-cantico.json</strong> para ver e pesquisar os hinos.</p>
        <label class="botao-arquivo" for="arquivoCantico">
          <i class="fa-solid fa-folder-open"></i> Escolher arquivo .json
        </label>
        <input type="file" id="arquivoCantico" accept="application/json,.json">
        <span class="nome-arquivo" id="nomeArquivoCantico"></span>
        <span class="erro" id="erroArquivoCantico"></span>
      </div>

      <div id="conteudoCantico" style="display:none;">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="buscaHino" placeholder="Buscar por número, título ou trecho da letra...">
        </div>

        <ul class="result-list" id="listaHinos"></ul>

        <div class="reader-box" id="leitorHino" style="display:none;">
          <button class="voltar-lista" onclick="fecharHino()">
            <i class="fa-solid fa-arrow-left"></i> Voltar à lista
          </button>
          <span class="subtitulo" id="numeroHino">Hino</span>
          <h2 id="tituloHino"></h2>
          <div class="letra-hino" id="letraHino"></div>
        </div>
      </div>

      <p class="empty-msg" id="carregandoMsg">Carregando o hinário...</p>
    </div>
  </div>

  <script>
    /* ============================================================
       Mesma lógica da página da Bíblia: tenta buscar sozinho o
       "novo-cantico.json" da mesma pasta (fetch); se não conseguir
       (arquivo aberto direto do computador), mostra o botão manual.
    ============================================================ */

    let dadosCantico = null;
    const listaHinos = document.getElementById('listaHinos');
    const buscaHino = document.getElementById('buscaHino');
    const leitorHino = document.getElementById('leitorHino');

    function escapeHtml(s){
      return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }

    function ativarCantico(json){
      dadosCantico = json;
      document.getElementById('carregandoMsg').style.display = 'none';
      document.getElementById('carregadorCantico').style.display = 'none';
      document.getElementById('conteudoCantico').style.display = 'block';
      renderizarLista('');
    }

    async function tentarCarregarAutomatico(){
      try{
        const resp = await fetch('./novo-cantico.json');
        if (!resp.ok) throw new Error('http ' + resp.status);
        const json = await resp.json();
        if (!Array.isArray(json) || !json[0] || !json[0].titulo) throw new Error('formato inesperado');
        ativarCantico(json);
        return true;
      } catch(err){
        return false;
      }
    }

    document.getElementById('arquivoCantico').addEventListener('change', function(e){
      const file = e.target.files[0];
      const erroEl = document.getElementById('erroArquivoCantico');
      erroEl.style.display = 'none';
      if (!file) return;
      document.getElementById('nomeArquivoCantico').textContent = 'Carregando ' + file.name + '...';

      const reader = new FileReader();
      reader.onload = function(ev){
        try{
          const json = JSON.parse(ev.target.result);
          if (!Array.isArray(json) || !json[0] || !json[0].titulo) throw new Error('formato inesperado');
          ativarCantico(json);
        } catch(err){
          erroEl.textContent = 'Não consegui ler esse arquivo. Confira se é o .json do Novo Cântico.';
          erroEl.style.display = 'block';
          document.getElementById('nomeArquivoCantico').textContent = '';
        }
      };
      reader.onerror = function(){
        erroEl.textContent = 'Erro ao ler o arquivo.';
        erroEl.style.display = 'block';
      };
      reader.readAsText(file, 'utf-8');
    });

    function destacar(texto, termo){
      if (!termo) return escapeHtml(texto);
      const regex = new RegExp('(' + termo.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
      return escapeHtml(texto).replace(regex, '<mark>$1</mark>');
    }

    function primeiraLinhaComTermo(letra, termo){
      const linhas = letra.split('\n');
      if (!termo) return linhas[0] || '';
      const encontrada = linhas.find(l => l.toLowerCase().includes(termo));
      return encontrada || linhas[0] || '';
    }

    function renderizarLista(termoOriginal){
      const termo = (termoOriginal || '').trim().toLowerCase();
      listaHinos.innerHTML = '';

      const filtrados = dadosCantico.filter(h => {
        if (!termo) return true;
        return h.numero.toLowerCase().includes(termo) ||
               h.titulo.toLowerCase().includes(termo) ||
               h.letra.toLowerCase().includes(termo);
      });

      if (filtrados.length === 0){
        listaHinos.innerHTML = '<li class="empty-msg" style="cursor:default;">Nenhum hino encontrado para "' + escapeHtml(termoOriginal) + '".</li>';
        return;
      }

      const paraMostrar = termo ? filtrados : filtrados.slice(0, 40);
      paraMostrar.forEach(hino => {
        const li = document.createElement('li');
        const trecho = primeiraLinhaComTermo(hino.letra, termo);
        li.innerHTML = '<span class="ref">Nº ' + destacar(hino.numero, termo) + ' — ' + destacar(hino.titulo, termo) + '</span>' +
                        '<span class="snippet">' + destacar(trecho, termo) + '</span>';
        li.addEventListener('click', () => abrirHino(hino));
        listaHinos.appendChild(li);
      });

      if (!termo && dadosCantico.length > 40){
        const aviso = document.createElement('li');
        aviso.className = 'empty-msg';
        aviso.style.cursor = 'default';
        aviso.textContent = 'Mostrando os primeiros 40 de ' + dadosCantico.length + ' hinos. Use a busca para encontrar outros.';
        listaHinos.appendChild(aviso);
      }
    }

    function abrirHino(hino){
      document.getElementById('numeroHino').textContent = 'Hino nº ' + hino.numero;
      document.getElementById('tituloHino').textContent = hino.titulo;
      document.getElementById('letraHino').textContent = hino.letra;
      listaHinos.style.display = 'none';
      document.querySelector('.search-box').style.display = 'none';
      leitorHino.style.display = 'block';
      leitorHino.scrollIntoView({ behavior:'smooth', block:'start' });
    }

    function fecharHino(){
      leitorHino.style.display = 'none';
      listaHinos.style.display = 'flex';
      document.querySelector('.search-box').style.display = 'block';
    }

    let debounceHino;
    buscaHino.addEventListener('input', () => {
      clearTimeout(debounceHino);
      debounceHino = setTimeout(() => renderizarLista(buscaHino.value), 200);
    });

    (async () => {
      const ok = await tentarCarregarAutomatico();
      if (!ok){
        document.getElementById('carregandoMsg').style.display = 'none';
        document.getElementById('carregadorCantico').style.display = 'block';
      }
    })();
  </script>


  <script>
    // Registra o Service Worker para permitir instalar o app e usar offline
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('Não foi possível registrar o service worker.', err);
        });
      });
    }
  </script>
</body>
</html>
