<!DOCTYPE html>

<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f2019">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <button class="tab active" onclick="mudarAba(this)">Início</button>
    <button class="tab" onclick="mudarAba(this)">Novidades</button>
  </div>

  <div class="main">

    <div class="top-icons">
      <div class="left-icons">
        <a aria-label="Notificações" href="notificacoes.html"><i class="fa-regular fa-bell"></i></a>
        <a aria-label="Configurações" href="configuracoes.html"><i class="fa-solid fa-gear"></i></a>
      </div>
      <a aria-label="Perfil" href="perfil.html"><i class="fa-regular fa-circle-user"></i></a>
    </div>

    <div class="arch-wrap">
      <div class="arch">
        <i class="fa-solid fa-church logo-icon"></i>
        <h1>Primeira Igreja<br>Presbiteriana<br>em Queimados</h1>
        <p>PIPQ</p>
      </div>
    </div>

    <p class="verse" id="verseBox">
      <strong>“</strong>O Senhor é o meu pastor; nada me faltará.<strong>”</strong> — Salmos 23:1
    </p>

    <div class="grid">
      <a class="item" href="igreja.html"><i class="fa-solid fa-church"></i><p>Igreja</p></a>
      <a class="item" href="https://youtube.com" target="_blank" rel="noopener"><i class="fa-solid fa-tv"></i><p>PIPQ TV</p></a>
      <a class="item" href="contribua.html"><i class="fa-solid fa-hand-holding-heart"></i><p>Contribua</p></a>
      <a class="item" href="eventos.html"><i class="fa-regular fa-calendar"></i><p>Eventos</p></a>
      <a class="item" href="oracao.html"><i class="fa-solid fa-hands-praying"></i><p>Oração</p></a>
      <a class="item" href="noticias.html"><i class="fa-regular fa-newspaper"></i><p>Notícias</p></a>
      <a class="item" href="pastoreio.html"><i class="fa-solid fa-users"></i><p>Pastoreio</p></a>
      <a class="item" href="cantico.html"><i class="fa-solid fa-book-bible"></i><p>Novo Cântico</p></a>
      <a class="item" href="mensagens.html"><i class="fa-regular fa-message"></i><p>Mensagens</p></a>
      <a class="item" href="https://wa.me/5500000000000" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i><p>WhatsApp</p></a>
      <a class="item" href="agenda.html"><i class="fa-solid fa-calendar-days"></i><p>Agenda</p></a>
      <a class="item" href="boletim.html"><i class="fa-solid fa-envelope"></i><p>Boletim</p></a>
      <a class="item" href="biblia.html"><i class="fa-solid fa-book-open"></i><p>Bíblia</p></a>
      <a class="item" href="lives.html"><i class="fa-solid fa-video"></i><p>Lives</p></a>
      <a class="item" href="devocional.html"><i class="fa-solid fa-cross"></i><p>Devocional</p></a>
    </div>
  </div>

  <script>
    /* ============================================================
       Cada botão do menu é um link real (<a href="pagina.html">)
       para um arquivo próprio na mesma pasta. "PIPQ TV" e "WhatsApp"
       continuam abrindo sites de terceiros em nova aba.
    ============================================================ */
    function mudarAba(botaoClicado){
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      botaoClicado.classList.add('active');
    }

    const versiculos = [
      { texto:'O Senhor é o meu pastor; nada me faltará.', ref:'Salmos 23:1' },
      { texto:'Tudo posso naquele que me fortalece.', ref:'Filipenses 4:13' },
      { texto:'O amor jamais acaba.', ref:'1 Coríntios 13:8' },
      { texto:'Entrega o teu caminho ao Senhor; confia nele, e ele o fará.', ref:'Salmos 37:5' }
    ];
    const hoje = new Date().getDate() % versiculos.length;
    const v = versiculos[hoje];
    document.getElementById('verseBox').innerHTML =
      '<strong>“</strong>' + v.texto + '<strong>”</strong> — ' + v.ref;
  </script>


  <script>
    // Registra o Service Worker para permitir instalar o app e usar offline
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('Não foi possível registrar o service worker.', err);
        });
      });
    }
  </script>
</body>
</html>
