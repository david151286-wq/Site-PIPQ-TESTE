<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia Sagrada - PIPQ</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f2019">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="voltar-flutuante" href="index.html" aria-label="Voltar para o início">
    <i class="fa-solid fa-arrow-left"></i>
  </a>

  <div class="page-content">
    <div class="tool-wrap">

      <div class="tool-header">
        <i class="fa-solid fa-book-open"></i>
        <h1>Bíblia Sagrada</h1>
      </div>

      <div class="version-toggle" id="versionToggle">
        <button data-versao="ARA" class="ativo">ARA</button>
        <button data-versao="NAA">NAA</button>
        <button data-versao="ACF">ACF</button>
      </div>

      <div class="picker-row">
        <select id="selectLivro" aria-label="Livro"></select>
        <select id="selectCapitulo" aria-label="Capítulo"></select>
        <select id="selectVersiculo" aria-label="Ir para o versículo"></select>
      </div>

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="buscaTexto" placeholder="Pesquisar palavra ou trecho...">
      </div>

      <ul class="result-list" id="listaResultados" style="display:none;"></ul>

      <div class="reader-box" id="leitor">
        <button class="voltar-lista" id="voltarBusca" style="display:none;" onclick="fecharResultados()">
          <i class="fa-solid fa-arrow-left"></i> Voltar à pesquisa
        </button>
        <span class="subtitulo" id="tituloVersao">ARA</span>
        <h2 id="tituloCapitulo">Carregando...</h2>
        <div id="versiculos"></div>
        <div class="nav-caps">
          <button id="btnCapAnterior"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
          <button id="btnCapProximo">Próximo <i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       DADOS DA BÍBLIA — embutidos direto neste arquivo (ARA, NAA
       e ACF). Isso garante que o site funcione em qualquer
       navegador, mesmo aberto direto do computador, sem depender
       de buscar (fetch) outro arquivo à parte.
       Para atualizar o texto de uma versão, gere este bloco de novo
       a partir do .json correspondente (veja README no projeto).
  ============================================================ -->
  <script src="_dados_biblia.js"></script>

  <script>
    /* ============================================================
       COMO FUNCIONA
       -------------------------------------------------------------
       window.BIBLIA_ARA / window.BIBLIA_NAA / window.BIBLIA_ACF já
       chegam prontos (carregados pelo <script src> acima). O botão
       de versão só troca qual dessas variáveis está sendo usada —
       não faz nenhum pedido de rede.
    ============================================================ */

    const LIMITE_RESULTADOS = 60;
    let versaoAtual = 'ARA';
    let livroAtualIndex = 0;
    let capituloAtualIndex = 0;

    function dadosVersao(){
      if (versaoAtual === 'NAA') return window.BIBLIA_NAA;
      if (versaoAtual === 'ACF') return window.BIBLIA_ACF;
      return window.BIBLIA_ARA;
    }

    function escapeHtml(s){
      return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }

    const selectLivro = document.getElementById('selectLivro');
    const selectCapitulo = document.getElementById('selectCapitulo');
    const selectVersiculo = document.getElementById('selectVersiculo');
    const buscaTexto = document.getElementById('buscaTexto');
    const listaResultados = document.getElementById('listaResultados');
    const leitor = document.getElementById('leitor');
    const tituloVersao = document.getElementById('tituloVersao');
    const tituloCapitulo = document.getElementById('tituloCapitulo');
    const versiculosDiv = document.getElementById('versiculos');
    const voltarBusca = document.getElementById('voltarBusca');

    function popularLivros(){
      selectLivro.innerHTML = '';
      dadosVersao().forEach((livro, i) => {
        const opt = document.createElement('option');
        opt.value = i; opt.textContent = livro.name;
        selectLivro.appendChild(opt);
      });
      selectLivro.value = livroAtualIndex;
    }

    function popularCapitulos(){
      const livro = dadosVersao()[livroAtualIndex];
      selectCapitulo.innerHTML = '';
      livro.chapters.forEach((cap, i) => {
        const opt = document.createElement('option');
        opt.value = i; opt.textContent = 'Capítulo ' + (i + 1);
        selectCapitulo.appendChild(opt);
      });
      selectCapitulo.value = capituloAtualIndex;
    }

    function popularVersiculos(){
      const livro = dadosVersao()[livroAtualIndex];
      const versiculos = livro.chapters[capituloAtualIndex];
      selectVersiculo.innerHTML = '';
      versiculos.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i; opt.textContent = 'Versículo ' + (i + 1);
        selectVersiculo.appendChild(opt);
      });
    }

    function mostrarCapitulo(scrollParaVersiculo){
      const livro = dadosVersao()[livroAtualIndex];
      const versiculos = livro.chapters[capituloAtualIndex];
      tituloVersao.textContent = versaoAtual;
      tituloCapitulo.textContent = livro.name + ' ' + (capituloAtualIndex + 1);

      versiculosDiv.innerHTML = '';
      versiculos.forEach((texto, i) => {
        const p = document.createElement('p');
        p.className = 'verso'; p.id = 'v' + i;
        p.innerHTML = '<span class="num">' + (i + 1) + '</span>' + texto;
        versiculosDiv.appendChild(p);
      });

      document.getElementById('btnCapAnterior').disabled = (livroAtualIndex === 0 && capituloAtualIndex === 0);
      document.getElementById('btnCapProximo').disabled = (livroAtualIndex === dadosVersao().length - 1 && capituloAtualIndex === livro.chapters.length - 1);

      if (typeof scrollParaVersiculo === 'number'){
        const alvo = document.getElementById('v' + scrollParaVersiculo);
        if (alvo) alvo.scrollIntoView({ behavior:'smooth', block:'center' });
      } else {
        leitor.scrollIntoView({ behavior:'smooth', block:'start' });
      }
    }

    function irParaCapituloAnterior(){
      const livro = dadosVersao()[livroAtualIndex];
      if (capituloAtualIndex > 0){ capituloAtualIndex--; }
      else if (livroAtualIndex > 0){ livroAtualIndex--; capituloAtualIndex = dadosVersao()[livroAtualIndex].chapters.length - 1; }
      else { return; }
      popularLivros(); popularCapitulos(); popularVersiculos(); mostrarCapitulo();
    }

    function irParaCapituloProximo(){
      const livro = dadosVersao()[livroAtualIndex];
      if (capituloAtualIndex < livro.chapters.length - 1){ capituloAtualIndex++; }
      else if (livroAtualIndex < dadosVersao().length - 1){ livroAtualIndex++; capituloAtualIndex = 0; }
      else { return; }
      popularLivros(); popularCapitulos(); popularVersiculos(); mostrarCapitulo();
    }

    selectLivro.addEventListener('change', () => {
      livroAtualIndex = Number(selectLivro.value); capituloAtualIndex = 0;
      popularCapitulos(); popularVersiculos(); mostrarCapitulo();
    });
    selectCapitulo.addEventListener('change', () => {
      capituloAtualIndex = Number(selectCapitulo.value);
      popularVersiculos(); mostrarCapitulo();
    });
    selectVersiculo.addEventListener('change', () => {
      mostrarCapitulo(Number(selectVersiculo.value));
    });
    document.getElementById('btnCapAnterior').addEventListener('click', irParaCapituloAnterior);
    document.getElementById('btnCapProximo').addEventListener('click', irParaCapituloProximo);

    document.getElementById('versionToggle').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-versao]');
      if (!btn) return;
      document.querySelectorAll('#versionToggle button').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      versaoAtual = btn.dataset.versao;
      livroAtualIndex = 0;
      capituloAtualIndex = 0;
      popularLivros(); popularCapitulos(); popularVersiculos();
      mostrarCapitulo();
      if (buscaTexto.value.trim()) executarBusca();
    });

    function executarBusca(){
      const termo = buscaTexto.value.trim().toLowerCase();
      if (!termo){ fecharResultados(); return; }
      const livros = dadosVersao();
      const resultados = [];
      for (let li = 0; li < livros.length && resultados.length < LIMITE_RESULTADOS; li++){
        const livro = livros[li];
        for (let ci = 0; ci < livro.chapters.length && resultados.length < LIMITE_RESULTADOS; ci++){
          const versiculos = livro.chapters[ci];
          for (let vi = 0; vi < versiculos.length && resultados.length < LIMITE_RESULTADOS; vi++){
            const texto = versiculos[vi];
            if (texto.toLowerCase().includes(termo)){
              resultados.push({ livroIndex: li, nome: livro.name, capitulo: ci, versiculo: vi, texto });
            }
          }
        }
      }

      listaResultados.innerHTML = '';
      listaResultados.style.display = 'flex';
      voltarBusca.style.display = 'inline-flex';
      leitor.style.display = 'none';

      if (resultados.length === 0){
        listaResultados.innerHTML = '<li class="empty-msg" style="cursor:default;">Nenhum resultado encontrado para "' + escapeHtml(buscaTexto.value.trim()) + '".</li>';
        return;
      }

      resultados.forEach(r => {
        const li = document.createElement('li');
        const regex = new RegExp('(' + termo.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
        const trechoDestacado = escapeHtml(r.texto).replace(regex, '<mark>$1</mark>');
        li.innerHTML = '<span class="ref">' + r.nome + ' ' + (r.capitulo + 1) + ':' + (r.versiculo + 1) + '</span>' +
                        '<span class="snippet">' + trechoDestacado + '</span>';
        li.addEventListener('click', () => {
          livroAtualIndex = r.livroIndex; capituloAtualIndex = r.capitulo;
          popularLivros(); popularCapitulos(); popularVersiculos();
          leitor.style.display = 'block';
          mostrarCapitulo(r.versiculo);
        });
        listaResultados.appendChild(li);
      });
    }

    function fecharResultados(){
      listaResultados.style.display = 'none';
      voltarBusca.style.display = 'none';
      leitor.style.display = 'block';
      buscaTexto.value = '';
    }

    let debounceBusca;
    buscaTexto.addEventListener('input', () => {
      clearTimeout(debounceBusca);
      debounceBusca = setTimeout(executarBusca, 250);
    });

    // ------- Inicialização (dados já estão em memória, sem espera) -------
    popularLivros();
    popularCapitulos();
    popularVersiculos();
    mostrarCapitulo();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.warn('Não foi possível registrar o service worker.', err);
        });
      });
    }
  </script>

</body>
</html>
